name: Metrics embed

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Metrics embed
        uses: lowlighter/metrics@v3.34
        with:
          user: Andromeda1101
          token: ${{ secrets.METRICS_TOKEN }}

          base: header, activity, community, repositories, metadata
          base_indepth: yes

          filename: github-metrics.svg
          committer_branch: main
          committer_token: ${{ secrets.METRICS_TOKEN }}
          config_timezone: Asia/Shanghai
          template: classic

          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 12

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          plugin_repositories: yes
          plugin_repositories_pinned: yes       
          
          plugin_calendar: yes
          plugin_calendar_limit: 0

          plugin_achievements: no  
          plugin_activity: no 

          plugin_people: yes
          plugin_people_types: followers, following
          plugin_people_limit: 12
          plugin_people_size: 48
          plugin_people_shuffle: no

          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_TOKEN }}
          plugin_wakatime_user: Andromeda1101
          plugin_wakatime_sections: time, languages, projects
          plugin_wakatime_days: 7
          plugin_wakatime_limit: 8
          plugin_wakatime_languages_other: yes

          # plugin_music: yes
          # plugin_music_provider: netease
          # plugin_music_user: 3574058930
          # plugin_music_mode: recent
          # plugin_music_limit: 8
          # plugin_music_time_range: all
